<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>*čas nové kapitoly…</title>
  <meta name="description" content="Odpočet do nové kapitoly — 29. 6. 2026" />

  <style>
    /* ---- Helvetica 93 Extended Black ---- */
    @font-face {
      font-family: "Helvetica93ExtendedBlack";
      src: url("fonts/Helvetica93-ExtendedBlack.woff2") format("woff2"),
           url("fonts/Helvetica93-ExtendedBlack.ttf") format("truetype");
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      /* Background pulled from the reference images */
      --bg: #00caf9;
      --white: #ffffff;
      --black: #000000;

      /* Big timer scales with the viewport. Letter-spacing is em-based so it
         stays tight-but-readable at every size (matching the reference look).
         Bump --timer-spacing toward -0.12em for an even tighter feel. */
      --timer-size: clamp(2.5rem, 13vw, 14rem);
      --timer-spacing: -0.07em;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      font-family: "Helvetica93ExtendedBlack", "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
    }

    /* Heading + timer live in the vertical centre */
    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1.5rem, 6vh, 5rem);
      padding: 2rem 1.25rem;
      text-align: center;
    }

    /* Heading is the user-supplied SVG lockup (with a custom č háček, since the
       font lacks č). Mobile is an INLINE svg so it can use the embedded
       @font-face; desktop is the self-contained outlined svg. Both scale via
       their viewBox. */
    .heading {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .heading-mobile {
      display: block;
      width: min(86vw, 32rem);
      height: auto;
    }
    .heading-desktop { display: none; }

    /* colours + metrics for the inline mobile lockup */
    .heading-mobile .cls-1 {
      font-family: "Helvetica93ExtendedBlack";
      font-size: 281.11px;
      font-weight: 900;
    }
    .heading-mobile .cls-2 { fill: var(--white); }
    .heading-mobile .cls-3 { letter-spacing: -0.1em; }
    .heading-mobile .cls-4 { letter-spacing: -0.1em; }
    .heading-mobile .cls-5 { letter-spacing: -0.15em; }

    /* wide screens: single-line outlined lockup */
    @media (min-width: 768px) {
      .heading-mobile { display: none; }
      .heading-desktop {
        display: block;
        width: min(66vw, 64rem);
        height: auto;
      }
    }

    .timer {
      color: var(--black);
      font-size: var(--timer-size);
      letter-spacing: var(--timer-spacing);
      line-height: 1;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      max-width: 100%;
      /* small nudge so the trailing negative letter-spacing stays centered */
      padding-left: 0.1em;
    }

    /* ---- Social row pinned to the bottom ---- */
    .socials {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(1.75rem, 5vw, 3.5rem);
      padding: clamp(1.5rem, 4vh, 3rem) 1rem;
    }

    .socials a {
      color: var(--black);
      display: inline-flex;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .socials a:hover { opacity: 0.7; transform: translateY(-2px); }

    .socials svg {
      width: clamp(28px, 4vw, 44px);
      height: clamp(28px, 4vw, 44px);
      display: block;
    }

    @media (prefers-reduced-motion: reduce) {
      .socials a { transition: none; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <h1 class="heading" aria-label="*čas nové kapitoly…">
      <!-- mobile: inline so it uses the embedded @font-face (č = c + polygon háček) -->
      <svg class="heading-mobile" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1675.95 550.6" aria-hidden="true"><text class="cls-1" transform="translate(.84 240.91)"><tspan class="cls-4"><tspan x="0" y="0">*</tspan><tspan class="cls-2" x="102.32" y="0">cas nové</tspan></tspan><tspan class="cls-2"><tspan class="cls-4" x="5.77" y="248.98" xml:space="preserve"> kapitol</tspan><tspan class="cls-5" x="1222.11" y="248.98">y</tspan><tspan class="cls-3" x="1381.49" y="248.98">...</tspan></tspan></text><polygon class="cls-2" points="321.91 31.86 278.24 72.43 177.39 72.43 133.7 31.86 212.31 31.86 231.47 53.27 250.63 31.86 321.91 31.86"/></svg>
      <!-- desktop: self-contained outlined svg -->
      <img class="heading-desktop" src="assets/heading-desktop.svg" alt="" aria-hidden="true" />
    </h1>
    <div class="timer" id="timer" role="timer" aria-live="off">0:00:00:00</div>
  </main>

  <nav class="socials" aria-label="Sociální sítě">
    <!-- Instagram (outline) -->
    <a href="https://www.instagram.com/hnuti_generace/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
      </svg>
    </a>

    <!-- Facebook (solid circle, white f) -->
    <a href="https://www.facebook.com/p/Hnut%C3%AD-Generace-100087370568043/" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="12" fill="currentColor"></circle>
        <path fill="var(--bg)" d="M13.5 21.9V13.9h2.7l.4-3.1h-3.1V8.8c0-.9.25-1.5 1.55-1.5H16.7V4.55C16.4 4.5 15.5 4.4 14.45 4.4c-2.2 0-3.7 1.35-3.7 3.8v2.6H8v3.1h2.75v8z"></path>
      </svg>
    </a>

    <!-- X -->
    <a href="https://x.com/hnutigenerace?lang=en" target="_blank" rel="noopener noreferrer" aria-label="X">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932 6.064-6.933zm-1.29 19.5h2.038L6.486 3.24H4.298z"></path>
      </svg>
    </a>
  </nav>

  <script>
    // Target: 29. 6. 2026, 00:00 local time
    const target = new Date(2026, 5, 29, 0, 0, 0, 0).getTime();
    const el = document.getElementById("timer");
    const pad = (n) => String(n).padStart(2, "0");

    function tick() {
      const diff = target - Date.now();

      if (diff <= 0) {
        el.textContent = "0:00:00:00";
        clearInterval(handle);
        return;
      }

      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff / 3600000) % 24);
      const minutes = Math.floor((diff / 60000) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      el.textContent = `${days}:${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
    }

    tick();
    const handle = setInterval(tick, 1000);
  </script>
</body>
</html>
